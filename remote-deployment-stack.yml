services:
  postgres:
    image: postgres:16-alpine
    container_name: harmony-django-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-harmony}
      POSTGRES_USER: ${DB_USERNAME:-harmony}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-harmony}
    volumes:
      - postgres_django_data:/var/lib/postgresql/data
    ports:
      - "54321:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-harmony} -d ${DB_DATABASE:-harmony}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harmony-net

  redis:
    image: redis:7-alpine
    container_name: harmony-django-redis
    restart: always
    ports:
      - "63791:6379"
    networks:
      - harmony-net

  backend:
    build: ./backend
    container_name: harmony-django-backend
    restart: always
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${APP_URL:-localhost},localhost,127.0.0.1,backend
      DATABASE_URL: postgres://${DB_USERNAME:-harmony}:${DB_PASSWORD:-harmony}@postgres:5432/${DB_DATABASE:-harmony}
      POSTGRES_DB: ${DB_DATABASE:-harmony}
      POSTGRES_USER: ${DB_USERNAME:-harmony}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-harmony}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      HARMONY_WEBHOOK_SECRET: ${HARMONY_WEBHOOK_SECRET}
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - harmony-net

  celery:
    build: ./backend
    container_name: harmony-django-celery
    restart: always
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      DATABASE_URL: postgres://${DB_USERNAME:-harmony}:${DB_PASSWORD:-harmony}@postgres:5432/${DB_DATABASE:-harmony}
      POSTGRES_DB: ${DB_DATABASE:-harmony}
      POSTGRES_USER: ${DB_USERNAME:-harmony}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-harmony}
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A config worker -l info
    depends_on:
      - backend
      - redis
    networks:
      - harmony-net

  celery-beat:
    build: ./backend
    container_name: harmony-django-beat
    restart: always
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      DATABASE_URL: postgres://${DB_USERNAME:-harmony}:${DB_PASSWORD:-harmony}@postgres:5432/${DB_DATABASE:-harmony}
      POSTGRES_DB: ${DB_DATABASE:-harmony}
      POSTGRES_USER: ${DB_USERNAME:-harmony}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-harmony}
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A config beat -l info
    depends_on:
      - backend
      - redis
    networks:
      - harmony-net

  frontend:
    build: ./frontend
    container_name: harmony-django-frontend
    restart: always
    environment:
      API_BASE_URL: http://backend:8000/api
      NEXT_PUBLIC_API_BASE_URL: ${APP_URL}/api
      APP_BASE_URL: ${APP_URL}
      COOKIE_SECURE: "true"
    ports:
      - "30001:3000"
    depends_on:
      - backend
    networks:
      - harmony-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-harmony-django
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml
    depends_on:
      - frontend
    networks:
      - harmony-net

volumes:
  postgres_django_data:

networks:
  harmony-net:
    driver: bridge